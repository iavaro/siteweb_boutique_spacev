<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoices - SpaceV</title>
  <link rel="stylesheet" href="/public/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container navbar-container">
      <a href="/" class="navbar-brand">
        <div class="navbar-logo">🚀</div>
        <span>SpaceV</span>
      </a>
      
      <button class="navbar-toggle">☰</button>
      
      <div class="navbar-menu">
        <ul class="navbar-links">
          <li><a href="/" class="navbar-link">Home</a></li>
          <li><a href="/store" class="navbar-link">Store</a></li>
          <li><a href="/support" class="navbar-link">Support</a></li>
          <li><a href="/admin" class="navbar-link" style="color: var(--color-primary);">⚡ Admin</a></li>
        </ul>
        
        <div class="navbar-actions">
          <a href="/cart" class="btn btn-ghost btn-icon">🛒 <span class="cart-count" style="display: none;">0</span></a>
          
          <div class="user-menu">
            <a href="/dashboard" class="btn btn-secondary">
              <span class="username">User</span>
            </a>
            <button class="btn btn-ghost" onclick="auth.logout()">Logout</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Invoices Content -->
  <section class="section">
    <div class="container">
      <h1 style="margin-bottom: var(--spacing-xl);">My Invoices</h1>
      
      <div id="invoices-content">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>© 2024 SpaceV. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="/public/scripts.js"></script>
  <script>
    async function loadInvoices() {
      const container = document.getElementById('invoices-content');
      
      try {
        const { invoices } = await invoices.getAll();
        
        if (invoices.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">📄</div>
              <h3 class="empty-state-title">No invoices yet</h3>
              <p class="empty-state-description">Your invoices will appear here after making a purchase.</p>
              <a href="/store" class="btn btn-primary">Browse Store</a>
            </div>
          `;
          return;
        }
        
        container.innerHTML = `
          <div class="table-container">
            <table class="table">
              <thead>
                <tr>
                  <th>Invoice #</th>
                  <th>Order ID</th>
                  <th>Amount</th>
                  <th>Status</th>
                  <th>Date</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                ${invoices.map(inv => `
                  <tr>
                    <td><strong>${inv.invoiceNumber}</strong></td>
                    <td>#${inv.order?.orderId?.slice(0, 12) || 'N/A'}</td>
                    <td>$${parseFloat(inv.total).toFixed(2)}</td>
                    <td><span class="badge badge-${inv.status === 'PAID' ? 'success' : 'warning'}">${inv.status}</span></td>
                    <td>${ui.formatDate(inv.createdAt)}</td>
                    <td>
                      <button class="btn btn-ghost btn-sm" onclick="invoices.downloadPdf(${inv.id})">Download</button>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;
      } catch (error) {
        container.innerHTML = '<p class="text-error">Failed to load invoices.</p>';
        if (error.message.includes('Authentication')) {
          window.location.href = '/login';
        }
      }
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      loadInvoices();
    });
  </script>
</body>
</html>
